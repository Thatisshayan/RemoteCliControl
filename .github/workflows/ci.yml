name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api-server tsc --noEmit
      - run: pnpm --filter api-server build

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api-server test

  build-server:
    name: Build Server (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:server
      - run: test -f artifacts/api-server/dist/index.mjs

  typecheck-mobile:
    name: TypeCheck Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @remotectrl/mobile tsc --noEmit

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @remotectrl/mobile test

  eas-build:
    name: EAS Build (iOS)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-server, typecheck-mobile, test-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: EAS Build
        run: eas build --platform ios --profile preview --non-interactive
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  eas-submit:
    name: EAS Submit (TestFlight)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [eas-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: EAS Submit
        run: eas submit --platform ios --profile preview --non-interactive
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  windows-release:
    name: Windows Release (.exe)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-server, typecheck-mobile, test-mobile]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build server
        run: pnpm build:server
      - name: Bundle .exe with pkg
        run: npx --yes @yao-pkg/pkg dist/tray.mjs --targets node20-win-x64 --out-path release/
        working-directory: artifacts/api-server
      - name: Assemble release folder
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $releaseDir = "RemoteCTRL-Windows-$version"
          New-Item -ItemType Directory -Force $releaseDir
          Copy-Item artifacts/api-server/release/RemoteCTRL.exe $releaseDir/ -ErrorAction SilentlyContinue
          Copy-Item artifacts/api-server/installer $releaseDir/installer -Recurse
          Copy-Item artifacts/api-server/README-WINDOWS.txt $releaseDir/
          New-Item -ItemType Directory -Force $releaseDir/data
          Compress-Archive -Path $releaseDir -DestinationPath "RemoteCTRL-Windows-$version.zip"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: RemoteCTRL-Windows-${{ github.ref_name }}.zip
          body: |
            ## RemoteCTRL ${{ github.ref_name }}

            ### Windows Desktop App
            1. Download and extract `RemoteCTRL-Windows-${{ github.ref_name }}.zip`
            2. Download `cloudflared.exe` from https://github.com/cloudflare/cloudflared/releases and place it in the extracted folder
            3. Double-click `RemoteCTRL.exe` — follow the first-run wizard
            4. Paste the tunnel URL into the iOS app

            ### iOS
            Available on TestFlight — see the EAS build job for the link.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  slack-notify:
    name: Slack Notification
    if: always()
    needs: [lint, test, build-server, typecheck-mobile, test-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "channel": "#obsidian-media",
              "username": "RemoteCTRL CI",
              "icon_emoji": ":rocket:",
              "attachments": [
                {
                  "color": "${{ contains(needs.*.result, 'failure') && '#ff0000' || '#36a64f' }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ contains(needs.*.result, 'failure') && ':x: RemoteCTRL CI — Failed' || ':white_check_mark: RemoteCTRL CI — Passed' }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Branch:*\n${{ github.ref_name }}" },
                        { "type": "mrkdwn", "text": "*Commit:*\n<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                        { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" },
                        { "type": "mrkdwn", "text": "*Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_id }}>" }
                      ]
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "${{ github.ref_name }} — ${{ github.actor }}"
                      }
                    },
                    {
                      "type": "divider"
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*lint (Node 20/22):* ${{ needs.lint.result == 'success' && ':white_check_mark:' || ':x:' }}" },
                        { "type": "mrkdwn", "text": "*test (Node 20/22):* ${{ needs.test.result == 'success' && ':white_check_mark:' || ':x:' }}" },
                        { "type": "mrkdwn", "text": "*build-server (Node 20/22):* ${{ needs.build-server.result == 'success' && ':white_check_mark:' || ':x:' }}" },
                        { "type": "mrkdwn", "text": "*typecheck-mobile:* ${{ needs.typecheck-mobile.result == 'success' && ':white_check_mark:' || ':x:' }}" },
                        { "type": "mrkdwn", "text": "*test-mobile:* ${{ needs.test-mobile.result == 'success' && ':white_check_mark:' || ':x:' }}" }
                      ]
                    }
                  ]
                }
              ]
            }
