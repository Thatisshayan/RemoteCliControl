name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options: [beta, bootstrap_certs, list_certs, revoke_cert]
      cert_id:
        description: 'ASC certificate id (only used by revoke_cert)'
        required: false
        default: ''
  push:
    tags:
      - "ios-v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild native iOS project (no EAS)
        working-directory: ./artifacts/mobile
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Copy fastlane config into the generated iOS project
        run: |
          cp ios/Gemfile artifacts/mobile/ios/Gemfile
          cp -r ios/fastlane artifacts/mobile/ios/fastlane

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: artifacts/mobile/ios

      - name: Install CocoaPods dependencies
        working-directory: artifacts/mobile/ios
        run: pod install

      - name: Derive match git auth from the workflow token
        id: match_auth
        run: |
          AUTH=$(printf 'x-access-token:%s' "${{ secrets.GITHUB_TOKEN }}" | base64)
          echo "::add-mask::$AUTH"
          echo "auth=$AUTH" >> "$GITHUB_OUTPUT"

      - name: Run fastlane
        working-directory: artifacts/mobile/ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ steps.match_auth.outputs.auth }}
          CERT_ID: ${{ github.event.inputs.cert_id }}
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}
