name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options: [beta, bootstrap_certs]
  push:
    tags:
      - "ios-v*"

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild native iOS project (no EAS)
        working-directory: ./artifacts/mobile
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Move generated ios project into place
        run: |
          rsync -a --delete artifacts/mobile/ios/ ios/
          rm -rf artifacts/mobile/ios

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: Run fastlane
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane ${{ github.event.inputs.lane || 'beta' }}
