services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - API_TOKEN=${API_TOKEN:?API_TOKEN must be set in .env — refusing to start with a default/empty token}
    restart: unless-stopped
