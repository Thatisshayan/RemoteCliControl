openapi: 3.0.3
info:
  title: RemoteCTRL API
  version: 1.0.0
  description: Current API contract synced to the stabilized implementation on July 17, 2026.

servers:
  - url: http://localhost:3000
    description: Local server root

paths:
  /health:
    get:
      summary: Public health status
      responses:
        "200":
          description: Health payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /tunnel-url:
    get:
      summary: Public tunnel status
      responses:
        "200":
          description: Tunnel status payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TunnelStatusResponse"

  /version:
    get:
      summary: Public server version
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /api/setup:
    get:
      summary: Check whether setup is required
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                properties:
                  setupRequired:
                    type: boolean

  /api/setup/init:
    post:
      summary: Complete first-run setup (loopback only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                PORT:
                  type: integer
                API_TOKEN:
                  type: string
                CLOUDFLARE_TUNNEL:
                  type: boolean
      responses:
        "200":
          description: Setup result with generated API token
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  apiToken:
                    type: string

  /api/setup/html:
    get:
      summary: Setup wizard HTML page (loopback only)
      responses:
        "200":
          description: HTML setup page
          content:
            text/html:
              schema:
                type: string

  /api/connection:
    get:
      summary: Get active redacted connection profile
      responses:
        "200":
          description: Active connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionProfileSafe"
    post:
      summary: Save or replace active connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "200":
          description: Redacted active connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionProfileSafe"

  /api/connection/test:
    post:
      summary: Test SSH connection details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionInput"
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestResult"

  /api/connections:
    get:
      summary: List redacted connection profiles
      responses:
        "200":
          description: Connection list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectionProfileSafe"
    post:
      summary: Create a connection profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NamedConnectionInput"
      responses:
        "201":
          description: Created connection profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionProfileSafe"

  /api/connections/active:
    get:
      summary: Get active redacted connection profile
      responses:
        "200":
          description: Active profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionProfileSafe"

  /api/connections/{id}/activate:
    post:
      summary: Activate connection profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activation success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/connections/{id}:
    delete:
      summary: Delete connection profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/sessions:
    get:
      summary: List sessions
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      summary: Create a session
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /api/sessions/{id}:
    patch:
      summary: Rename a session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRenameInput"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    delete:
      summary: Close a session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Close success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/files:
    get:
      summary: List files
      parameters:
        - in: query
          name: path
          required: false
          schema:
            type: string
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileListResponse"
    delete:
      summary: Delete file or directory
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/files/read:
    get:
      summary: Read text file
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileReadResponse"

  /api/files/download:
    get:
      summary: Download file
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/files/upload:
    post:
      summary: Upload file
      parameters:
        - in: query
          name: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/files/mkdir:
    post:
      summary: Create directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilePathInput"
      responses:
        "200":
          description: Mkdir success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/files/rename:
    patch:
      summary: Rename file or directory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileRenameInput"
      responses:
        "200":
          description: Rename success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/processes:
    get:
      summary: List Windows processes
      responses:
        "200":
          description: Process list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RemoteProcess"

  /api/processes/{pid}:
    delete:
      summary: Kill process
      parameters:
        - in: path
          name: pid
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kill success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/commands:
    get:
      summary: List saved commands
      responses:
        "200":
          description: Command list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedCommand"
    post:
      summary: Create saved command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, command]
              properties:
                label:
                  type: string
                command:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Created command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedCommand"

  /api/commands/{id}:
    delete:
      summary: Delete saved command
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /api/push/preferences:
    get:
      summary: Get push preferences
      responses:
        "200":
          description: Push preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPreferences"
    put:
      summary: Update push preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushPreferenceUpdate"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPreferences"

  /api/push/register:
    post:
      summary: Register a push notification device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pushToken, platform]
              properties:
                pushToken:
                  type: string
                platform:
                  type: string
                  enum: [ios, android]
                deviceName:
                  type: string
      responses:
        "200":
          description: Registered device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushDevice"

  /api/push/devices:
    get:
      summary: List registered push devices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PushDevice"

  /api/push/device/{id}:
    delete:
      summary: Remove a push device
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delete success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    PasswordAuthConnectionInput:
      type: object
      required: [host, port, username, password]
      properties:
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        authMode:
          type: string
          enum: [password]
    KeyAuthConnectionInput:
      type: object
      required: [host, port, username, privateKey]
      properties:
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        privateKey: { type: string }
        passphrase: { type: string }
        authMode:
          type: string
          enum: [key]
    ConnectionInput:
      oneOf:
        - $ref: "#/components/schemas/PasswordAuthConnectionInput"
        - $ref: "#/components/schemas/KeyAuthConnectionInput"
    NamedConnectionInput:
      allOf:
        - type: object
          required: [name]
          properties:
            name: { type: string }
        - $ref: "#/components/schemas/ConnectionInput"
    ConnectionProfileSafe:
      type: object
      required: [id, name, host, port, username, authMode, hasPassword, hasPrivateKey, hasPassphrase]
      properties:
        id: { type: string }
        name: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        authMode:
          type: string
          enum: [password, key]
        hasPassword: { type: boolean }
        hasPrivateKey: { type: boolean }
        hasPassphrase: { type: boolean }
    Session:
      type: object
      required: [id, title, status, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        status:
          type: string
          enum: [connecting, connected, disconnected, error]
        createdAt: { type: string, format: date-time }
    SessionRenameInput:
      type: object
      required: [title]
      properties:
        title: { type: string }
    FileItem:
      type: object
      required: [name, path, type, size, modifiedAt, permissions]
      properties:
        name: { type: string }
        path: { type: string }
        type:
          type: string
          enum: [file, directory, symlink]
        size: { type: number }
        modifiedAt: { type: string }
        permissions: { type: string }
    FileListResponse:
      type: object
      required: [path, items]
      properties:
        path: { type: string }
        items:
          type: array
          items:
            $ref: "#/components/schemas/FileItem"
    FilePathInput:
      type: object
      required: [path]
      properties:
        path: { type: string }
    FileRenameInput:
      type: object
      required: [from, to]
      properties:
        from: { type: string }
        to: { type: string }
    FileReadResponse:
      type: object
      required: [content]
      properties:
        content: { type: string }
    RemoteProcess:
      type: object
      required: [pid, name, cpu, memory, status, user]
      properties:
        pid: { type: integer }
        name: { type: string }
        cpu: { type: number }
        memory: { type: number }
        status:
          type: string
          enum: [running, not responding]
        user: { type: string }
    SavedCommand:
      type: object
      required: [id, label, command, description]
      properties:
        id: { type: string }
        label: { type: string }
        command: { type: string }
        description: { type: string }
    TestResult:
      type: object
      required: [success, message, latencyMs]
      properties:
        success: { type: boolean }
        message: { type: string }
        latencyMs: { type: number }
    PushPreferences:
      type: object
      required: [sessionDisconnected, serverHealthChange]
      properties:
        sessionDisconnected: { type: boolean }
        serverHealthChange: { type: boolean }
    PushPreferenceUpdate:
      type: object
      properties:
        sessionDisconnected: { type: boolean }
        serverHealthChange: { type: boolean }
    PushDevice:
      type: object
      required: [id, pushToken, platform, createdAt, updatedAt]
      properties:
        id: { type: string }
        pushToken: { type: string }
        platform:
          type: string
          enum: [ios, android]
        deviceName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    HealthResponse:
      type: object
      required: [status, activeSessions, connectionConfigured, uptimeSeconds, version, authMode, tunnelEnabled]
      properties:
        status:
          type: string
          enum: [ok]
        activeSessions: { type: integer }
        connectionConfigured: { type: boolean }
        uptimeSeconds: { type: integer }
        version: { type: string }
        authMode:
          type: string
          enum: [none, token]
        tunnelEnabled: { type: boolean }
    TunnelStatusResponse:
      type: object
      required: [active, tunnelUrl]
      properties:
        active: { type: boolean }
        tunnelUrl:
          type: string
          nullable: true
    VersionResponse:
      type: object
      required: [version]
      properties:
        version: { type: string }
        mobileMinVersion: { type: string }
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
